name: "Docker Build and Push"
description: "Builds a Docker image and pushes it to AWS ECR"

inputs:
  service-name:
    description: "Name of the microservice"
    required: true
  service-path:
    description: "Path to the service folder from repo root"
    required: true
  ecr-registry:
    description: "The ECR registry URL"
    required: true
  image-tag:
    description: "Tag to apply to the image"
    required: true

runs:
  using: "composite"
  steps:
    - name: Build Docker image
      shell: bash
      run: |
        docker build \
          -t ${{ inputs.ecr-registry }}/${{ inputs.service-name }}:${{ inputs.image-tag }} \
          -t ${{ inputs.ecr-registry }}/${{ inputs.service-name }}:latest \
          ./${{ inputs.service-path }}

    - name: Push image to ECR
      shell: bash
      run: |
        docker push ${{ inputs.ecr-registry }}/${{ inputs.service-name }}:${{ inputs.image-tag }}
        docker push ${{ inputs.ecr-registry }}/${{ inputs.service-name }}:latest