name: Multi-Cluster Deploy

on:
  push:
    branches:
      - week2-multi-cluster
  workflow_dispatch:

env:
  AWS_REGION_PRIMARY: us-east-2
  AWS_REGION_SECONDARY: us-east-1
  PRIMARY_CLUSTER: jibike-rideshare-cluster
  SECONDARY_CLUSTER: light-rideshare-cluster
  NAMESPACE: rideshare-app

jobs:
  deploy-secondary:
    name: Deploy to Secondary Cluster (us-east-1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_SECONDARY }}

      - name: Update kubeconfig for secondary cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION_SECONDARY }} \
            --name ${{ env.SECONDARY_CLUSTER }}

      - name: Deploy region config to secondary
        run: |
          kubectl apply -f light-rideshare-k8s/multi-cluster/configmap-secondary.yaml

      - name: Deploy all applications to secondary
        run: |
          kubectl apply -f light-rideshare-k8s/applications/driver-service/
          kubectl apply -f light-rideshare-k8s/applications/rider-service/
          kubectl apply -f light-rideshare-k8s/applications/trip-service/
          kubectl apply -f light-rideshare-k8s/applications/matching-service/
          kubectl apply -f light-rideshare-k8s/applications/email-service/
          kubectl apply -f light-rideshare-k8s/applications/frontend/

      - name: Verify secondary deployment
        run: |
          kubectl rollout status deployment/driver-service -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/rider-service -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl get pods -n ${{ env.NAMESPACE }}

  deploy-primary:
    name: Deploy to Primary Cluster (us-east-2)
    runs-on: ubuntu-latest
    needs: deploy-secondary
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_PRIMARY }}

      - name: Update kubeconfig for primary cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION_PRIMARY }} \
            --name ${{ env.PRIMARY_CLUSTER }}

      - name: Deploy region config to primary
        run: |
          kubectl apply -f light-rideshare-k8s/multi-cluster/configmap-primary.yaml

      - name: Deploy all applications to primary
        run: |
          kubectl apply -f light-rideshare-k8s/applications/driver-service/
          kubectl apply -f light-rideshare-k8s/applications/rider-service/
          kubectl apply -f light-rideshare-k8s/applications/trip-service/
          kubectl apply -f light-rideshare-k8s/applications/matching-service/
          kubectl apply -f light-rideshare-k8s/applications/email-service/
          kubectl apply -f light-rideshare-k8s/applications/frontend/

      - name: Verify primary deployment
        run: |
          kubectl rollout status deployment/driver-service -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/rider-service -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl get pods -n ${{ env.NAMESPACE }}
EOFcat > .github/workflows/multi-cluster-deploy.yml << 'EOF'
