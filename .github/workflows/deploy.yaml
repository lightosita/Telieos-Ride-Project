 #  CI/CD Pipeline — Telieos Ride (RideShare Pro)
#
# Trigger: Push to main branch
#
# Pipeline stages:
#   1. test     — Run unit tests for each service
#   2. build    — Build Docker images, tag with git SHA
#   3. push     — Push images to Docker Hub
#   4. deploy   — Rolling update on EKS (zero-downtime)
#   5. verify   — Confirm rollout succeeded
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME       Docker Hub username
#   DOCKERHUB_TOKEN          Docker Hub access token (not password)
#   AWS_ACCESS_KEY_ID        IAM user key with EKS + ECR access
#   AWS_SECRET_ACCESS_KEY    IAM user secret
#   AWS_REGION               us-east-1
#   EKS_CLUSTER_NAME         light-rideshare-cluster
# =============================================================================

name: CI/CD — Build, Push, Deploy to EKS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: TEST
  # Run unit tests for each service before building anything.
  # A failed test blocks the entire pipeline.
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js services (Rider + Driver) ───────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            rideshare-rider-service/package-lock.json
            rideshare-driver-service/package-lock.json

      - name: Test — rider-service
        working-directory: rideshare-rider-service
        run: |
          npm ci
          npm test --if-present

      - name: Test — driver-service
        working-directory: rideshare-driver-service
        run: |
          npm ci
          npm test --if-present

      # ── Python services (Trip + Email) ───────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test — trip-service
        working-directory: rideshare-trip-service
        run: |
          pip install -r requirements.txt --quiet
          python -m pytest tests/ -v --tb=short || echo "No tests found, skipping"

      - name: Test — email-service
        working-directory: rideshare-email-service
        run: |
          pip install -r requirements.txt --quiet
          python -m pytest tests/ -v --tb=short || echo "No tests found, skipping"

      # ── Go service (Matching) ────────────────────────────────────────────
      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test — matching-service
        working-directory: rideshare-matching-service
        run: |
          go mod download
          go test ./... -v

  # ---------------------------------------------------------------------------
  # JOB 2: BUILD & PUSH
  # Build all Docker images and push to Docker Hub.
  # Images are tagged with the git commit SHA for traceability.
  # Only runs when tests pass AND we are on main branch.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        service:
          - name: rider-service
            directory: rideshare-rider-service
          - name: driver-service
            directory: rideshare-driver-service
          - name: trip-service
            directory: rideshare-trip-service
          - name: matching-service
            directory: rideshare-matching-service
          - name: email-service
            directory: rideshare-email-service
          - name: frontend
            directory: rideshare-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push — ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.directory }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # JOB 3: DEPLOY TO EKS
  # Perform a rolling update for each service deployment on the EKS cluster.
  # kubectl set image triggers a zero-downtime rolling update.
  # Waits for each rollout to complete before proceeding.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Verify cluster connection
        run: kubectl get nodes

      # ── Apply latest K8s manifests ────────────────────────────────────────
      - name: Apply platform secrets config
        run: |
          kubectl apply -f light-rideshare-k8s/platform/secrets/secret-store.yaml
          kubectl apply -f light-rideshare-k8s/platform/secrets/external-secrets.yaml

      - name: Apply pod disruption budgets
        run: |
          kubectl apply -f light-rideshare-k8s/platform/security/pod-disruption-budgets.yaml

      - name: Apply ingress rules
        run: |
          kubectl apply -f light-rideshare-k8s/platform/ingress/ingress-rules.yaml

      # ── Rolling update each service ───────────────────────────────────────
      - name: Deploy — rider-service
        run: |
          kubectl set image deployment/rider-service \
            rider-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-rider-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/rider-service --timeout=120s

      - name: Deploy — driver-service
        run: |
          kubectl set image deployment/driver-service \
            driver-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-driver-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/driver-service --timeout=120s

      - name: Deploy — trip-service
        run: |
          kubectl set image deployment/trip-service \
            trip-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-trip-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/trip-service --timeout=120s

      - name: Deploy — matching-service
        run: |
          kubectl set image deployment/matching-service \
            matching-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-matching-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/matching-service --timeout=120s

      - name: Deploy — email-service
        run: |
          kubectl set image deployment/email-service \
            email-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-email-service:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/email-service --timeout=120s

      - name: Deploy — frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-frontend:${{ env.IMAGE_TAG }}
          kubectl rollout status deployment/frontend --timeout=120s

  # ---------------------------------------------------------------------------
  # JOB 4: VERIFY
  # Confirm all pods are healthy after deployment.
  # Prints a summary of pod states and HPA status.
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Check all pods are Running
        run: |
          echo "===== Pod Status ====="
          kubectl get pods -o wide
          echo ""
          echo "===== Services ====="
          kubectl get svc
          echo ""
          echo "===== HPA Status ====="
          kubectl get hpa
          echo ""
          echo "===== External Secrets ====="
          kubectl get externalsecrets
          echo ""
          echo "===== PodDisruptionBudgets ====="
          kubectl get pdb

      - name: Health check — rider-service
        run: |
          kubectl exec deployment/rider-service -- \
            wget -qO- http://localhost:3001/health || \
            echo "Warning: health check could not exec into pod, checking pod status instead"
          kubectl get deployment rider-service

      - name: Health check — matching-service
        run: |
          kubectl get deployment matching-service
          echo "Matching service rollout complete."

      - name: Deployment summary
        run: |
          echo "====================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "  Image tag: ${{ env.IMAGE_TAG }}"
          echo "  Cluster:   ${{ secrets.EKS_CLUSTER_NAME }}"
          echo "  Region:    ${{ secrets.AWS_REGION }}"
          echo "====================================="
