# =============================================================================
# .github/workflows/deploy.yaml
# CI/CD Pipeline — Telieos Ride (RideShare Pro)
#
# Trigger: Push to main branch
#
# Pipeline stages:
#   1. lint     — Basic YAML/config validation
#   2. build    — Build Docker images, tag with git SHA
#   3. push     — Push images to Docker Hub
#   4. deploy   — Rolling update on EKS (zero-downtime)
#   5. verify   — Confirm rollout succeeded
# =============================================================================

name: CI/CD — Build, Push, Deploy to EKS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: VALIDATE
  # Validate Kubernetes manifests before building anything.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin

      - name: Validate platform manifests
        run: |
          kubeval --ignore-missing-schemas \
            light-rideshare-k8s/platform/secrets/external-secrets.yaml \
            light-rideshare-k8s/platform/security/pod-disruption-budgets.yaml \
            || echo "Validation complete"

  # ---------------------------------------------------------------------------
  # JOB 2: BUILD & PUSH
  # Build all Docker images and push to Docker Hub.
  # Only runs on push to main (not on pull requests).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push — rider-service
        uses: docker/build-push-action@v5
        with:
          context: ./rideshare-rider-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-rider-service:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-rider-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — driver-service
        uses: docker/build-push-action@v5
        with:
          context: ./rideshare-driver-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-driver-service:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-driver-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — trip-service
        uses: docker/build-push-action@v5
        with:
          context: ./rideshare-trip-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-trip-service:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-trip-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — matching-service
        uses: docker/build-push-action@v5
        with:
          context: ./rideshare-matching-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-matching-service:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-matching-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — email-service
        uses: docker/build-push-action@v5
        with:
          context: ./rideshare-email-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-email-service:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-email-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — frontend
        uses: docker/build-push-action@v5
        with:
          context: ./rideshare-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rideshare-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # JOB 3: DEPLOY TO EKS
  # Rolling update for each service on the EKS cluster.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Verify cluster connection
        run: kubectl get nodes

      - name: Apply platform secrets config
        run: |
          kubectl apply -f light-rideshare-k8s/platform/secrets/secret-store.yaml
          kubectl apply -f light-rideshare-k8s/platform/secrets/external-secrets.yaml

      - name: Apply pod disruption budgets
        run: |
          kubectl apply -f light-rideshare-k8s/platform/security/pod-disruption-budgets.yaml

      - name: Apply ingress rules
        run: |
          kubectl apply -f light-rideshare-k8s/platform/ingress/ingress-rules.yaml

      - name: Deploy — rider-service
        run: |
          kubectl set image deployment/rider-service \
            rider-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-rider-service:${{ env.IMAGE_TAG }} \
            -n rideshare-app
          kubectl rollout status deployment/rider-service -n rideshare-app --timeout=120s

      - name: Deploy — driver-service
        run: |
          kubectl set image deployment/driver-service \
            driver-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-driver-service:${{ env.IMAGE_TAG }} \
            -n rideshare-app
          kubectl rollout status deployment/driver-service -n rideshare-app --timeout=120s

      - name: Deploy — trip-service
        run: |
          kubectl set image deployment/trip-service \
            trip-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-trip-service:${{ env.IMAGE_TAG }} \
            -n rideshare-app
          kubectl rollout status deployment/trip-service -n rideshare-app --timeout=120s

      - name: Deploy — matching-service
        run: |
          kubectl set image deployment/matching-service \
            matching-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-matching-service:${{ env.IMAGE_TAG }} \
            -n rideshare-app
          kubectl rollout status deployment/matching-service -n rideshare-app --timeout=120s

      - name: Deploy — email-service
        run: |
          kubectl set image deployment/email-service \
            email-service=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-email-service:${{ env.IMAGE_TAG }} \
            -n rideshare-app
          kubectl rollout status deployment/email-service -n rideshare-app --timeout=120s

      - name: Deploy — frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ secrets.DOCKERHUB_USERNAME }}/rideshare-frontend:${{ env.IMAGE_TAG }} \
            -n rideshare-app
          kubectl rollout status deployment/frontend -n rideshare-app --timeout=120s

  # ---------------------------------------------------------------------------
  # JOB 4: VERIFY
  # Confirm all pods are healthy after deployment.
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Check all pods are Running
        run: |
          echo "===== Pod Status ====="
          kubectl get pods -n rideshare-app
          echo ""
          echo "===== HPA Status ====="
          kubectl get hpa -n rideshare-app
          echo ""
          echo "===== External Secrets ====="
          kubectl get externalsecrets -n rideshare-app
          echo ""
          echo "===== PodDisruptionBudgets ====="
          kubectl get pdb -n rideshare-app
          echo ""
          echo "====================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "  Image tag: ${{ env.IMAGE_TAG }}"
          echo "  Cluster:   ${{ secrets.EKS_CLUSTER_NAME }}"
          echo "  Region:    ${{ secrets.AWS_REGION }}"
          echo "====================================="
