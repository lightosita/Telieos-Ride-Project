name: CI/CD — Validate and Deploy to EKS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: VALIDATE K8s MANIFESTS
  # ---------------------------------------------------------------------------
  validate:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin

      - name: Validate external secrets
        run: |
          kubeval --ignore-missing-schemas \
            light-rideshare-k8s/platform/secrets/external-secrets.yaml \
            && echo "✅ external-secrets.yaml valid" \
            || echo "⚠️ custom CRDs skipped"

      - name: Validate pod disruption budgets
        run: |
          kubeval --ignore-missing-schemas \
            light-rideshare-k8s/platform/security/pod-disruption-budgets.yaml \
            && echo "✅ pod-disruption-budgets.yaml valid"

      - name: Validate application manifests
        run: |
          for dir in light-rideshare-k8s/applications/*/; do
            echo "Validating $dir..."
            for f in $dir*.yaml; do
              [ -f "$f" ] && kubeval --ignore-missing-schemas "$f" \
                && echo "✅ $f valid" \
                || echo "⚠️ $f skipped (custom CRD)"
            done
          done

  # ---------------------------------------------------------------------------
  # JOB 2: DEPLOY TO EKS
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Verify cluster connection
        run: kubectl get nodes

      - name: Apply secrets config
        run: |
          kubectl apply -f light-rideshare-k8s/platform/secrets/secret-store.yaml
          kubectl apply -f light-rideshare-k8s/platform/secrets/external-secrets.yaml

      - name: Apply pod disruption budgets
        run: |
          kubectl apply -f light-rideshare-k8s/platform/security/pod-disruption-budgets.yaml

      - name: Apply ingress rules
        run: |
          kubectl apply -f light-rideshare-k8s/platform/ingress/ingress-rules.yaml

      - name: Apply autoscaling config
        run: |
          kubectl apply -f light-rideshare-k8s/platform/autoscaling/cluster-autoscaler.yaml

      - name: Deploy all application manifests
        run: |
          for dir in light-rideshare-k8s/applications/*/; do
            echo "Deploying $dir..."
            kubectl apply -f $dir
          done

      - name: Wait for rollouts
        run: |
          for deployment in rider-service driver-service trip-service matching-service email-service frontend; do
            echo "Waiting for $deployment..."
            kubectl rollout status deployment/$deployment \
              -n rideshare-app --timeout=120s \
              && echo "✅ $deployment live" \
              || echo "⚠️ $deployment rollout check failed"
          done

  # ---------------------------------------------------------------------------
  # JOB 3: VERIFY
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Cluster health summary
        run: |
          echo "===== Nodes ====="
          kubectl get nodes
          echo "===== Pods ====="
          kubectl get pods -n rideshare-app
          echo "===== HPA ====="
          kubectl get hpa -n rideshare-app
          echo "===== External Secrets ====="
          kubectl get externalsecrets -n rideshare-app
          echo "===== PDBs ====="
          kubectl get pdb -n rideshare-app
          echo "====================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "  Commit: ${{ github.sha }}"
          echo "  Cluster: ${{ secrets.EKS_CLUSTER_NAME }}"
          echo "====================================="
