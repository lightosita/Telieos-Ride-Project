apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: trip-service-secrets
    namespace: rideshare-app
spec:
    refreshInterval: 1h
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    target:
      name: trip-service-secrets
    data:
      - secretKey: DATABASE_URL
        remoteRef:
          key: light/trip-service
          property: DATABASE_URL
      - secretKey: REDIS_URL
        remoteRef:
          key: light/trip-service
          property: REDIS_URL
