
apiVersion: apps/v1
kind: Deployment
metadata:
    name: trip-service
    namespace: rideshare-app
    labels:
      app: trip-service
spec:
    replicas: 2
    selector:
      matchLabels:
        app: trip-service
    template:
      metadata:
        labels:
          app: trip-service
      spec:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - trip-service
                  topologyKey: topology.kubernetes.io/zone
        containers:
          - name: trip-service
            image: 221693237976.dkr.ecr.us-east-1.amazonaws.com/rideshare-trip-service:1.2
            ports:
              - containerPort: 3005
            envFrom:
              - configMapRef:
                  name: trip-service-config
              - secretRef:
                  name: trip-service-secrets
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 250m
                memory: 256Mi
            readinessProbe:
              httpGet:
                path: /health
                port: 3005
              initialDelaySeconds: 10
              periodSeconds: 5
            livenessProbe:
              httpGet:
                path: /health
                port: 3005
              initialDelaySeconds: 30
              periodSeconds: 10