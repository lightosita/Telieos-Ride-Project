apiVersion: apps/v1
kind: Deployment
metadata:
    name: frontend
    namespace: rideshare-app
    labels:
      app: frontend
spec:
    replicas: 2
    selector:
      matchLabels:
        app: frontend
    template:
      metadata:
        labels:
          app: frontend
      spec:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - frontend
                  topologyKey: topology.kubernetes.io/zone
        containers:
          - name: frontend
            image: 221693237976.dkr.ecr.us-east-1.amazonaws.com/rideshare-frontend:2.2
            ports:
              - containerPort: 3000
            envFrom:
              - configMapRef:
                  name: frontend-config
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 250m
                memory: 256Mi
            readinessProbe:
              httpGet:
                path: /
                port: 3000
              initialDelaySeconds: 10
              periodSeconds: 5
            livenessProbe:
              httpGet:
                path: /
                port: 3000
              initialDelaySeconds: 30
              periodSeconds: 10
