#1. RIDER SERVICE
#    AWS SM path: light/rider-service
#    Keys: DATABASE_URL, JWT_SECRET, REDIS_HOST, REDIS_PORT, REDIS_PASSWORD,
#          GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# -----------------------------------------------------------------------------

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rider-service-secrets
  namespace: rideshare-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rider-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: light/rider-service
        property: DATABASE_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: light/rider-service
        property: JWT_SECRET
    - secretKey: REDIS_HOST
      remoteRef:
        key: light/rider-service
        property: REDIS_HOST
    - secretKey: REDIS_PORT
      remoteRef:
        key: light/rider-service
        property: REDIS_PORT
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: light/rider-service
        property: REDIS_PASSWORD
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: light/rider-service
        property: GOOGLE_CLIENT_ID
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: light/rider-service
        property: GOOGLE_CLIENT_SECRET

---

